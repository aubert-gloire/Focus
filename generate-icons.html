<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FOCUS — Icon Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 32px;
    }
    h1 { color: #6c63ff; font-size: 22px; }
    p  { color: #7b7f94; font-size: 14px; }
    .previews {
      display: flex;
      gap: 24px;
      align-items: flex-end;
    }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #7b7f94;
    }
    button {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>FOCUS Icon Generator</h1>
  <p>Click the button to generate and download all 4 icon sizes as PNG files.</p>

  <div class="previews" id="previews"></div>

  <button onclick="generateAll()">Download all icons</button>

  <script>
    const SIZES = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const radius = size * 0.18;

      // Background — rounded rect
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = '#6c63ff';
      ctx.fill();

      // White "F" lettermark
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.round(size * 0.62)}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('F', size / 2, size / 2 + size * 0.03);

      return canvas;
    }

    function generateAll() {
      SIZES.forEach(size => {
        const canvas = drawIcon(size);
        const link   = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href     = canvas.toDataURL('image/png');
        link.click();
      });
    }

    // Render previews on load
    window.onload = () => {
      const wrap = document.getElementById('previews');
      SIZES.forEach(size => {
        const canvas = drawIcon(size);
        const div    = document.createElement('div');
        div.className = 'preview';
        div.appendChild(canvas);
        div.appendChild(document.createTextNode(`${size}×${size}`));
        wrap.appendChild(div);
      });
    };
  </script>
</body>
</html>
